<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peso Certo — Orçamento Rápido</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #0f1424;
  --card: #141a2e;
  --card-hover: #1a2240;
  --border: #1c2540;
  --border-hi: #2a3558;
  --text: #e8edf5;
  --text2: #94a3b8;
  --text3: #5a6a85;
  --blue: #3b82f6;
  --blue-g: rgba(59,130,246,.12);
  --green: #22c55e;
  --green-g: rgba(34,197,94,.10);
  --amber: #f59e0b;
  --amber-g: rgba(245,158,11,.10);
  --purple: #a78bfa;
  --purple-g: rgba(167,139,250,.10);
  --red: #ef4444;
  --red-g: rgba(239,68,68,.10);
  --radius: 14px;
  --radius-sm: 10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px;max-width:860px;margin:0 auto}

/* HEADER */
.header{
  text-align:center;padding:28px 20px;margin-bottom:24px;
  background:linear-gradient(145deg,rgba(59,130,246,.06),rgba(34,197,94,.04));
  border:1px solid var(--border);border-radius:var(--radius);
  position:relative;overflow:hidden;
}
.header::before{
  content:'';position:absolute;top:-60%;right:-20%;width:300px;height:300px;
  background:radial-gradient(circle,rgba(59,130,246,.08),transparent 70%);
  pointer-events:none;
}
.header h1{font-size:22px;font-weight:800;letter-spacing:-.3px;margin-bottom:4px}
.header h1 span{
  background:linear-gradient(135deg,var(--blue),var(--green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header p{color:var(--text2);font-size:13px}

/* TABS */
.tabs{
  display:flex;gap:3px;margin-bottom:20px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:4px;
}
.tab{
  flex:1;padding:12px 8px;border-radius:8px;cursor:pointer;
  font-weight:700;font-size:13px;color:var(--text2);
  text-align:center;transition:all .2s;border:none;
  background:transparent;font-family:inherit;
}
.tab:hover{color:var(--text);background:rgba(255,255,255,.03)}
.tab.active{background:var(--blue);color:#fff;box-shadow:0 2px 12px rgba(59,130,246,.3)}
.tab-content{display:none}.tab-content.active{display:block}

/* FORM */
.form-row{
  display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:20px;
}
@media(min-width:500px){.form-row{grid-template-columns:1fr 1fr}}
.field{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:14px;
}
.field label{
  display:block;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.8px;
  color:var(--text3);margin-bottom:8px;
}
.field input,.field select{
  width:100%;background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:11px 14px;color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:15px;
  font-weight:600;outline:none;transition:all .2s;
}
.field input:focus,.field select:focus{
  border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-g);
}
.field input::placeholder{color:var(--text3)}

/* KPI CARDS */
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
@media(min-width:600px){.kpis{grid-template-columns:repeat(4,1fr)}}
.kpi{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:16px;transition:all .25s;
}
.kpi:hover{border-color:var(--border-hi);transform:translateY(-1px)}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);font-weight:700;margin-bottom:5px}
.kpi-val{font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:700;line-height:1.2}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:3px}
.c-blue{color:var(--blue)}.c-green{color:var(--green)}
.c-amber{color:var(--amber)}.c-purple{color:var(--purple)}.c-red{color:var(--red)}

/* MSG BOX */
.section{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;margin-bottom:20px;
}
.section-title{
  font-size:14px;font-weight:700;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.msg{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:16px;
  font-family:'JetBrains Mono',monospace;font-size:12px;
  line-height:1.9;white-space:pre-wrap;color:var(--green);
  cursor:pointer;transition:all .2s;position:relative;
  min-height:60px;
}
.msg:hover{border-color:var(--green)}
.copy-badge{
  position:absolute;top:10px;right:10px;
  background:rgba(34,197,94,.12);color:var(--green);
  font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;
  padding:4px 10px;border-radius:6px;letter-spacing:.5px;
  text-transform:uppercase;pointer-events:none;
}
.copied .copy-badge{background:var(--green);color:#fff}

/* BOLETO SUMMARY */
.bol-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}
@media(min-width:500px){.bol-grid{grid-template-columns:repeat(4,1fr)}}
.bol-item{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:12px;text-align:center;
}
.bol-item .bl{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);font-weight:700;margin-bottom:4px}
.bol-item .bv{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700}

/* DESCONTO TABLE */
.desc-table{width:100%;border-collapse:separate;border-spacing:0;margin-top:12px;font-size:12px}
.desc-table th{
  padding:8px 10px;font-size:9px;text-transform:uppercase;
  letter-spacing:.6px;color:var(--text3);font-weight:700;
  background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);
  text-align:center;
}
.desc-table td{
  padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.03);
  font-family:'JetBrains Mono',monospace;text-align:center;
}
.desc-table tr:hover td{background:rgba(255,255,255,.02)}
.desc-table .sel td{background:var(--blue-g);font-weight:700}

.footer{text-align:center;padding:20px;color:var(--text3);font-size:11px}
</style>
</head>
<body>

<div class="header">
  <h1>⚖️ <span>PESO CERTO</span></h1>
  <p>Gerador de Orçamento — Vendedores</p>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('cartao',this)">💳 Cartão / PIX</button>
  <button class="tab" onclick="switchTab('boleto',this)">📑 Boleto</button>
</div>

<!-- ═══════════ ABA CARTÃO / PIX ═══════════ -->
<div id="tab-cartao" class="tab-content active">
  <div class="form-row">
    <div class="field">
      <label>💰 Valor de Tabela (R$)</label>
      <input type="number" id="c_valor" value="5000" placeholder="Ex: 5000" oninput="calcCartao()">
    </div>
    <div class="field">
      <label>📦 Nome do Produto</label>
      <input type="text" id="c_produto" value="" placeholder="Ex: Freezer 560L" oninput="calcCartao()" style="font-family:'DM Sans',sans-serif">
    </div>
  </div>

  <div class="kpis" id="c_kpis"></div>

  <div class="section">
    <div class="section-title">📱 Mensagem WhatsApp — Copiar e Enviar</div>
    <div class="msg" id="c_msg" onclick="copyThis(this)">
      <span class="copy-badge">📋 COPIAR</span>
    </div>
  </div>
</div>

<!-- ═══════════ ABA BOLETO ═══════════ -->
<div id="tab-boleto" class="tab-content">
  <div class="form-row">
    <div class="field">
      <label>💰 Valor Sistema (R$)</label>
      <input type="number" id="b_valor" value="3548" oninput="calcBoleto()">
    </div>
    <div class="field">
      <label>📦 Nome do Produto</label>
      <input type="text" id="b_produto" value="" placeholder="Ex: Fogão Industrial" oninput="calcBoleto()" style="font-family:'DM Sans',sans-serif">
    </div>
  </div>
  <div class="form-row">
    <div class="field">
      <label>🔢 Quantas Vezes (1-10)</label>
      <input type="number" id="b_parcelas" value="7" min="1" max="10" oninput="calcBoleto()">
    </div>
    <div class="field">
      <label>💵 % Entrada</label>
      <input type="number" id="b_entrada" value="25" min="0" max="100" step="5" oninput="calcBoleto()">
    </div>
  </div>

  <div class="kpis" id="b_kpis"></div>

  <div class="section">
    <div class="section-title">📱 Mensagem WhatsApp — Copiar e Enviar</div>
    <div class="msg" id="b_msg" onclick="copyThis(this)">
      <span class="copy-badge">📋 COPIAR</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">📊 Tabela de Descontos por Parcela</div>
    <table class="desc-table" id="descTable"></table>
  </div>
</div>

<div class="footer">Peso Certo Comercial — Ferramenta interna de vendas</div>

<script>
// ===== CONSTANTES =====
const D12=0.08, D6=0.12, DVista=0.185;
const DESC_BOL={1:.17,2:.15,3:.14,4:.11,5:.10,6:.09,7:.08,8:.02,9:.0001,10:.00001};

function R$(v){return'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}

// ===== CARTÃO / PIX =====
function calcCartao(){
  const val=parseFloat(document.getElementById('c_valor').value)||0;
  const prod=document.getElementById('c_produto').value.trim();

  const v12=val*(1-D12), v6=val*(1-D6), vV=val*(1-DVista);
  const p12=Math.ceil(v12/12), p6=Math.ceil(v6/6);
  const v21=val, p21=Math.floor(v21/21);
  const show21=val>=5000;

  document.getElementById('c_kpis').innerHTML=`
    <div class="kpi"><div class="kpi-label">À Vista</div><div class="kpi-val c-green">${R$(Math.ceil(vV))}</div><div class="kpi-sub">18,5% off</div></div>
    <div class="kpi"><div class="kpi-label">6x Cartão</div><div class="kpi-val c-blue">${R$(p6)}<span style="font-size:11px;color:var(--text2)">/mês</span></div><div class="kpi-sub">Total: ${R$(p6*6)}</div></div>
    <div class="kpi"><div class="kpi-label">12x Cartão</div><div class="kpi-val c-amber">${R$(p12)}<span style="font-size:11px;color:var(--text2)">/mês</span></div><div class="kpi-sub">Total: ${R$(p12*12)}</div></div>
    ${show21?`<div class="kpi"><div class="kpi-label">21x Cartão</div><div class="kpi-val c-purple">${R$(p21)}<span style="font-size:11px;color:var(--text2)">/mês</span></div><div class="kpi-sub">Total: ${R$(p21*21)}</div></div>`
    :`<div class="kpi"><div class="kpi-label">Economia</div><div class="kpi-val c-green">${R$(val-Math.ceil(vV))}</div><div class="kpi-sub">à vista vs tabela</div></div>`}
  `;

  const nomeProd = prod ? `\n*Produto:* ${prod}\n` : '\n*Produto:*\n';
  let msg;
  if(show21){
    msg=`*Segue o orçamento:*\n${nomeProd}\n 💰 *Valor de tabela:* ~${R$(val)}~\n\n🚀 *Promoção Hoje* ✅\n\n* *À vista:* ${R$(Math.ceil(vV))}\n* *6x:* ${R$(p6)}  (Total: ${R$(p6*6)})\n* *12x:* ${R$(p12)}  (Total: ${R$(p12*12)})\n* *21x:* ${R$(p21)}  (Total: ${R$(p21*21)})\n\n👉  *Pronta entrega*\n👉  *Frete grátis*`;
  } else {
    msg=`*Segue o orçamento:*\n${nomeProd}\n 💰 *Valor de tabela:* ~${R$(val)}~\n\n🚀 *Promoção Hoje* ✅\n\n* *À vista:* ${R$(Math.ceil(vV))}\n* *6x:* ${R$(p6)}  (Total: ${R$(p6*6)})\n* *12x:* ${R$(p12)}  (Total: ${R$(p12*12)})\n\n👉  *Pronta entrega*\n👉  *Frete grátis*`;
  }
  setMsg('c_msg',msg);
}

// ===== BOLETO =====
function calcBoleto(){
  const val=parseFloat(document.getElementById('b_valor').value)||0;
  const prod=document.getElementById('b_produto').value.trim();
  const n=Math.min(10,Math.max(1,parseInt(document.getElementById('b_parcelas').value)||1));
  const pctE=(parseFloat(document.getElementById('b_entrada').value)||0)/100;

  const desc=DESC_BOL[n]||0;
  const descVal=val*desc;
  const final_=val-descVal;
  const entrada=Math.floor(val*pctE);
  const rest=final_-entrada;
  const nParc=n===1?1:n-1;
  const parc=rest/nParc;

  document.getElementById('b_kpis').innerHTML=`
    <div class="kpi"><div class="kpi-label">Valor Final</div><div class="kpi-val c-blue">${R$(final_)}</div><div class="kpi-sub">-${(desc*100).toFixed(1)}%</div></div>
    <div class="kpi"><div class="kpi-label">Entrada</div><div class="kpi-val c-green">${R$(entrada)}</div><div class="kpi-sub">${(pctE*100).toFixed(0)}%</div></div>
    <div class="kpi"><div class="kpi-label">Restante</div><div class="kpi-val c-amber">${R$(rest)}</div></div>
    <div class="kpi"><div class="kpi-label">${nParc}x de</div><div class="kpi-val c-purple">${R$(Math.round(parc))}</div></div>
  `;

  const nomeProd = prod ? `\n*Produto:* ${prod}\n` : '';
  const msgB=`*Pagamento no Boleto* 📑\n${nomeProd}\n💰 *Valor:* ~${R$(val)}~\n🏷️ *Desconto:* ${(desc*100).toFixed(1)}%\n✅ *Valor Final:* ${R$(final_)}\n\n📌 *Entrada:* ${R$(entrada)}\n📌 *${nParc} parcela${nParc>1?'s':''} de:* ${R$(Math.round(parc))}\n\n📋 *Resumo:*\n   Entrada: ${R$(entrada)}\n   + ${nParc}x ${R$(Math.round(parc))} = ${R$(Math.round(parc)*nParc)}\n   *Total: ${R$(entrada+Math.round(parc)*nParc)}*\n\n👉 *Pronta entrega*\n👉 *Frete grátis*`;
  setMsg('b_msg',msgB);

  // Tabela de descontos
  let thtml='<thead><tr><th>Parcelas</th><th>Desconto</th><th>Valor Final</th><th>Entrada ('+((pctE*100).toFixed(0))+'%)</th><th>Parcela</th></tr></thead><tbody>';
  for(let i=1;i<=10;i++){
    const d=DESC_BOL[i]||0;
    const vf=val-val*d;
    const ent=Math.floor(val*pctE);
    const r=vf-ent;
    const np=i===1?1:i-1;
    const p=r/np;
    const sel=i===n?'sel':'';
    thtml+=`<tr class="${sel}"><td>${i}x</td><td>${(d*100).toFixed(1)}%</td><td>${R$(vf)}</td><td>${R$(ent)}</td><td>${R$(Math.round(p))}</td></tr>`;
  }
  thtml+='</tbody>';
  document.getElementById('descTable').innerHTML=thtml;
}

// ===== UTILS =====
function setMsg(id,text){
  const el=document.getElementById(id);
  // Keep the badge
  el.innerHTML=`<span class="copy-badge">📋 COPIAR</span>`+text.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  el._text=text;
}

function copyThis(el){
  const text=el._text||el.textContent;
  navigator.clipboard.writeText(text).then(()=>{
    el.classList.add('copied');
    el.querySelector('.copy-badge').textContent='✅ COPIADO!';
    setTimeout(()=>{
      el.classList.remove('copied');
      el.querySelector('.copy-badge').textContent='📋 COPIAR';
    },1500);
  });
}

function switchTab(name,btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}

// INIT
calcCartao();
calcBoleto();
</script>
</body>
</html>
